# ==========================================
# RTPLink Configuration
# ==========================================

# ==========================================
# PERMISSIONS
# ==========================================
# To give players access, use LuckPerms:
#   /lp group <group> permission set <permission> true
#
# All Permissions:
#   rtplink.admin       - ALL commands
#   rtplink.rtp        - /rtp, /rtp local
#   rtplink.sethome    - /sethome
#   rtplink.home       - /home, /delhome
#   rtplink.tpa        - /tpa, /tpaaccept, /tpadecline
#   rtplink.visit      - /visit
#   rtplink.location   - /location
#
# Commands:
#   /rtp, /rtp local      - Random Teleport
#   /sethome <name>       - Set a home location
#   /home [name]           - Teleport to home
#   /delhome <name>        - Delete a home
#   /tpa <player> [here]  - Teleport request
#   /tpaaccept              - Accept TPA request
#   /tpadecline            - Decline TPA request
#   /visit [server]        - Visit other servers
#   /location <DE|US|...>  - Set your location
#   /vrtplink             - Admin commands
# ==========================================

rtp:
  world: "world"
  min-x: -1000
  max-x: 1000
  min-z: -1000
  max-z: 1000

# Override server-specific settings with config.yml values on reload (default: true)
# true  = config.yml settings are applied to all servers on /vrtplink reload
# false = config.yml is only a template, servers.yml keeps its own values
override-existing: true

# Enable geo-location based server selection (default: true)
geo-enabled: true

# Debug mode - enables verbose logging (default: false)
debug: false

# Port for Helper plugin connections (default: 25577)
# This is the port that Helper plugins connect TO
port: 25577

# Command aliases - define which commands are registered
# Format: commandname: [alias1, alias2, ...]
# Example: tpa: [tpr] -> registers only /tpr (replaces /tpa)
# Example: tpa: [tpa, tpr] -> registers /tpa and /tpr
aliases:
  vrtplink: [vrtplink]
  rtp: [rtp]
  sethome: [sethome]
  home: [home]
  delhome: [delhome]
  tpa: [tpa]
  tpaaccept: [tpaaccept]
  tpadecline: [tpadecline]
  visit: [visit]
  location: [location]
  getlocation: [getlocation]
